name: release

# based on https://github.com/lustre-labs/lustre/blob/main/.github/workflows/release.yml

on:
  workflow_dispatch:
  release:
    types: [released, prereleased]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          rebar3-version: "3"
          gleam-version: "1.15.3"

      - run: gleam format --check

      - run: gleam test --target erlang

      - run: gleam test --target javascript

      - run: gleam publish -y
        env:
          HEXPM_API_KEY: ${{ secrets.HEXPM_API_KEY }}
